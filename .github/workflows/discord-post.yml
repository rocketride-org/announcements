name: Post announcements to Discord

# Schedule-driven Discord poster.
#
# Once an hour this checks announcements.json and posts any announcement
# whose scheduled time has arrived (discord_post_at, else valid_from) and that
# hasn't been posted yet. Posted ids are recorded in .discord/posted.json so
# nothing is ever double-posted. Set an announcement's time in the future to
# queue it; the cron posts it when the time comes.
#
# Requires repo secret: DISCORD_ANNOUNCEMENT_WEBHOOK_URL

on:
  schedule:
    - cron: '0 * * * *' # top of every hour (GitHub cron is best-effort)
  workflow_dispatch: {} # allow manual "post now" runs

permissions:
  contents: write # to commit the posted-ledger back to the repo

concurrency:
  group: discord-post
  cancel-in-progress: false # never let two runs race the ledger

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Post due announcements
        env:
          DISCORD_ANNOUNCEMENT_WEBHOOK_URL: ${{ secrets.DISCORD_ANNOUNCEMENT_WEBHOOK_URL }}
        run: bash .github/scripts/post-to-discord.sh

      - name: Record posted announcements
        run: |
          if ! git diff --quiet -- .discord/posted.json; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .discord/posted.json
            git commit -m "chore: record Discord-posted announcements [skip ci]"
            git push
          else
            echo "No new posts; ledger unchanged."
          fi
